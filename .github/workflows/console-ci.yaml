name: Console CI

on:
  push:
    branches: [main]
    paths: ['monitoring-console/**']
  pull_request:
    branches: [main]
    paths: ['monitoring-console/**']

env:
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  REGISTRY:   ${{ vars.GCP_REGION || 'us-central1' }}-docker.pkg.dev/${{ vars.GCP_PROJECT }}/monitoring

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: monitoring-console
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm', cache-dependency-path: monitoring-console/package-lock.json }
      - run: npm ci
      - run: npm run build

  build-push:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_CI_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push console
        id: image
        working-directory: monitoring-console
        run: |
          TAG="${{ github.sha }}"
          IMAGE="${{ env.REGISTRY }}/console:${TAG}"
          docker build -t "${IMAGE}" .
          docker push "${IMAGE}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Bump console tag in infrastructure (dev)
        uses: actions/github-script@v7
        env:
          TAG: ${{ steps.image.outputs.tag }}
        with:
          script: |
            const { TAG } = process.env
            const tfvarsPath = 'infrastructure/terraform/envs/dev/20-app/terraform.tfvars'
            const { data: file } = await github.rest.repos.getContent({
              owner: context.repo.owner, repo: context.repo.repo, path: tfvarsPath
            })
            let content = Buffer.from(file.content, 'base64').toString()
            content = content.replace(/(console_tag\s*=\s*)"[^"]*"/, `$1"${TAG}"`)
            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner, repo: context.repo.repo,
              path: tfvarsPath,
              message: `ci: bump console to ${TAG.slice(0,8)}`,
              content: Buffer.from(content).toString('base64'),
              sha: file.sha,
            })
