name: Terraform

on:
  push:
    branches: [main]
    paths: ['infrastructure/**']
  pull_request:
    branches: [main]
    paths: ['infrastructure/**']
  schedule:
    - cron: '0 6 * * *'   # nightly drift detection

env:
  TF_VERSION:   "1.10.x"
  GCP_REGION:   ${{ vars.GCP_REGION || 'us-central1' }}
  STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_ROOT:      infrastructure/terraform/envs/dev

jobs:
  # ‚îÄ‚îÄ Plan on PRs ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write

    strategy:
      matrix:
        layer: [00-network, 10-platform, 20-app, 30-observability]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_TF_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "${{ env.TF_VERSION }}" }

      - name: Init ${{ matrix.layer }}
        run: |
          terraform -chdir=${{ env.TF_ROOT }}/${{ matrix.layer }} init \
            -backend-config="bucket=${{ env.STATE_BUCKET }}"

      - name: Plan ${{ matrix.layer }}
        id: plan
        run: |
          terraform -chdir=${{ env.TF_ROOT }}/${{ matrix.layer }} plan \
            -var="project_id=${{ vars.GCP_PROJECT }}" \
            -var="region=${{ env.GCP_REGION }}" \
            -no-color 2>&1 | tee plan_output.txt

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const plan = fs.readFileSync('plan_output.txt', 'utf8').slice(-30000)
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform plan ‚Äî \`dev/${{ matrix.layer }}\`\n\`\`\`\n${plan}\n\`\`\``
            })

  # ‚îÄ‚îÄ Apply on merge to main ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  apply:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    environment: dev   # manual approval gate in GitHub Environments

    strategy:
      max-parallel: 1   # layers must apply in order
      matrix:
        layer: [00-network, 10-platform, 20-app, 30-observability]

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_TF_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "${{ env.TF_VERSION }}" }

      - name: Init ${{ matrix.layer }}
        run: |
          terraform -chdir=${{ env.TF_ROOT }}/${{ matrix.layer }} init \
            -backend-config="bucket=${{ env.STATE_BUCKET }}"

      - name: Apply ${{ matrix.layer }}
        run: |
          terraform -chdir=${{ env.TF_ROOT }}/${{ matrix.layer }} apply \
            -var="project_id=${{ vars.GCP_PROJECT }}" \
            -var="region=${{ env.GCP_REGION }}" \
            -auto-approve

  # ‚îÄ‚îÄ Nightly drift detection ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  drift:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    strategy:
      matrix:
        layer: [00-network, 10-platform, 20-app, 30-observability]

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_TF_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "${{ env.TF_VERSION }}" }

      - name: Detect drift in ${{ matrix.layer }}
        id: plan
        run: |
          terraform -chdir=${{ env.TF_ROOT }}/${{ matrix.layer }} init \
            -backend-config="bucket=${{ env.STATE_BUCKET }}"
          terraform -chdir=${{ env.TF_ROOT }}/${{ matrix.layer }} plan \
            -var="project_id=${{ vars.GCP_PROJECT }}" \
            -detailed-exitcode 2>&1 | tee drift.txt
        continue-on-error: true

      - name: Open drift issue
        if: steps.plan.outputs.exitcode == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs')
            const drift = fs.readFileSync('drift.txt', 'utf8').slice(-20000)
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[drift] dev/${{ matrix.layer }} has drift`,
              body: `\`\`\`\n${drift}\n\`\`\``,
              labels: ['drift', 'infrastructure']
            })
