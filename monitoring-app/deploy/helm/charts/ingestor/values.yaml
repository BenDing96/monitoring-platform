replicaCount: 1

image:
  repository: localhost:5001/ingestor
  tag: dev
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8081

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

clickhouse:
  addr: "clickhouse:9000"
  db: monitoring
  user: default
  password: ""
  tls: false

env: []
